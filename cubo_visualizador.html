<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cubo Prédios — GTA Santos</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #111;
  color: #ddd;
  font-family: 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
  gap: 12px;
}
h1 { color: #7cf; font-size: 15px; letter-spacing: 2px; margin-bottom: 4px; }
.app { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
canvas { border: 1px solid #444; display: block; cursor: crosshair; }
.hint { font-size: 10px; color: #666; text-align: center; margin-top: 4px; }
.panel { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 12px; width: 270px; display: flex; flex-direction: column; gap: 10px; }
.group { display: flex; flex-direction: column; gap: 5px; }
.gtitle { font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #2a2a2a; padding-bottom: 3px; }
.row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
.row span { color: #7cf; min-width: 38px; text-align: right; }
input[type=range] { width: 100%; accent-color: #7cf; }
.color-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #aaa; }
.swatch { width: 32px; height: 20px; border-radius: 3px; border: 1px solid #555; cursor: pointer; padding: 0; }
.check-row { display: flex; gap: 14px; font-size: 12px; align-items: center; }
.check-row label { color: #ccc; cursor: pointer; }
pre {
  background: #0a0a0a;
  padding: 8px;
  border-radius: 4px;
  font-size: 10px;
  color: #4f8;
  overflow-x: auto;
  white-space: pre-wrap;
  line-height: 1.5;
}
button {
  background: #0f2a1a;
  border: 1px solid #4f8;
  color: #4f8;
  padding: 5px 12px;
  cursor: pointer;
  border-radius: 4px;
  font-family: monospace;
  font-size: 11px;
}
button:hover { background: #1a4a2a; }
.mode-row { display: flex; gap: 6px; flex-wrap: wrap; }
.mode-btn {
  background: #1a1a2a;
  border: 1px solid #447;
  color: #aac;
  padding: 4px 8px;
  cursor: pointer;
  border-radius: 4px;
  font-size: 10px;
  font-family: monospace;
}
.mode-btn.active { background: #2a2a5a; border-color: #7cf; color: #7cf; }
</style>
</head>
<body>
<h1>▣ CUBO PRÉDIOS — GTA SANTOS</h1>
<div class="app">

  <div>
    <canvas id="c" width="480" height="480"></canvas>
    <p class="hint">Arraste o ponto laranja para definir o offset</p>
  </div>

  <div class="panel">

    <div class="group">
      <div class="gtitle">Modo de renderização</div>
      <div class="mode-row">
        <button class="mode-btn active" onclick="setMode(0,this)">Só deslocado</button>
        <button class="mode-btn" onclick="setMode(1,this)">Quads + base</button>
        <button class="mode-btn" onclick="setMode(2,this)">Só quads</button>
      </div>
    </div>

    <div class="group">
      <div class="gtitle">Offset (px pré-ESCALA)</div>
      <div class="row"><label>Offset X</label><span id="v-ox">0.5</span></div>
      <input type="range" id="sl-ox" min="0" max="12" step="0.1" value="0.5">
      <div class="row"><label>Offset Y</label><span id="v-oy">2.0</span></div>
      <input type="range" id="sl-oy" min="0.5" max="15" step="0.1" value="2.0">
    </div>

    <div class="group">
      <div class="gtitle">Forma do prédio</div>
      <div class="mode-row">
        <button class="mode-btn active" onclick="setShape(0,this)">L</button>
        <button class="mode-btn" onclick="setShape(1,this)">Rect</button>
        <button class="mode-btn" onclick="setShape(2,this)">Irregular</button>
      </div>
    </div>

    <div class="group">
      <div class="gtitle">Cores</div>
      <div class="color-row">
        <input type="color" class="swatch" id="c-roof" value="#c7bdad">
        <span>Telhado &nbsp; z = -1</span>
      </div>
      <div class="color-row" style="margin-top:4px">
        <input type="color" class="swatch" id="c-wall" value="#a09080">
        <span>Parede &nbsp;&nbsp; z = -2</span>
      </div>
      <div class="color-row" style="margin-top:4px">
        <input type="color" class="swatch" id="c-base" value="#7a7061">
        <span>Base &nbsp;&nbsp;&nbsp;&nbsp; z = -3</span>
      </div>
    </div>

    <div class="group">
      <div class="gtitle">Camadas visíveis</div>
      <div class="check-row">
        <input type="checkbox" id="sh-base" checked><label for="sh-base">Base</label>
        <input type="checkbox" id="sh-wall" checked><label for="sh-wall">Paredes</label>
        <input type="checkbox" id="sh-roof" checked><label for="sh-roof">Telhado</label>
      </div>
    </div>

    <div class="group">
      <div class="gtitle">Código Godot gerado</div>
      <pre id="code-out"></pre>
      <button onclick="copiar()">📋 Copiar</button>
    </div>

  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 480, H = 480;
const DS = 10; // display scale: px por unidade pré-ESCALA
const OX = W / 2 - 15, OY = H / 2 + 5; // centro na canvas

// Formas (em unidades pré-ESCALA, centradas em 0,0)
const SHAPES = [
  // L
  [[-14,-18],[10,-18],[10,-4],[20,-4],[20,18],[-14,18]],
  // Rect
  [[-14,-18],[14,-18],[14,18],[-14,18]],
  // Irregular
  [[-12,-16],[8,-18],[15,-10],[18,5],[10,17],[-5,18],[-14,10],[-14,-8]],
];

let mode  = 0;
let shape = 0;
let offX  = 0.5;  // pré-ESCALA units
let offY  = 2.0;
let dragging = false;

function poly() {
  return SHAPES[shape].map(([x,y]) => [OX + x*DS, OY + y*DS]);
}

function shiftedPoly(p, sx, sy) {
  return p.map(([x,y]) => [x + sx*DS, y + sy*DS]);
}

// ── Desenho ──────────────────────────────────────────────────────────────────

function fillPoly(pts, color) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function fillQuad(a, b, c, d, color) {
  ctx.beginPath();
  ctx.moveTo(a[0],a[1]);
  ctx.lineTo(b[0],b[1]);
  ctx.lineTo(c[0],c[1]);
  ctx.lineTo(d[0],d[1]);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function render() {
  const p   = poly();
  const ps  = shiftedPoly(p, offX, offY);
  const n   = p.length;
  const cRoof = document.getElementById('c-roof').value;
  const cWall = document.getElementById('c-wall').value;
  const cBase = document.getElementById('c-base').value;
  const shBase = document.getElementById('sh-base').checked;
  const shWall = document.getElementById('sh-wall').checked;
  const shRoof = document.getElementById('sh-roof').checked;

  // Fundo
  ctx.fillStyle = '#253525';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#2d402d';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 32) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 32) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Norte/Sul indicator
  ctx.fillStyle = '#444';
  ctx.font = '10px Courier New';
  ctx.fillText('N', W/2-4, 14);
  ctx.fillText('S', W/2-4, H-4);

  // z=-3: base (polígono deslocado)
  if (shBase && (mode === 0 || mode === 1)) {
    fillPoly(ps, cBase);
  }

  // z=-2: paredes (quads por aresta)
  if (shWall && (mode === 1 || mode === 2)) {
    for (let i = 0; i < n; i++) {
      const a = p[i], b = p[(i+1)%n];
      fillQuad(a, b, ps[(i+1)%n], ps[i], cWall);
    }
  }

  // z=-1: telhado
  if (shRoof) {
    fillPoly(p, cRoof);
  }

  // Linhas de contorno sutis
  if (shRoof) {
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    p.forEach(([x,y],i) => i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y));
    ctx.closePath();
    ctx.stroke();
  }

  // Offset arrow
  ctx.beginPath();
  ctx.setLineDash([4,3]);
  ctx.strokeStyle = '#f90';
  ctx.lineWidth = 1.5;
  ctx.moveTo(OX, OY);
  ctx.lineTo(OX + offX*DS, OY + offY*DS);
  ctx.stroke();
  ctx.setLineDash([]);

  // Ponto arrastável
  const dotX = OX + offX*DS, dotY = OY + offY*DS;
  ctx.beginPath();
  ctx.arc(dotX, dotY, 7, 0, Math.PI*2);
  ctx.fillStyle = '#f90';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.stroke();

  updateCode();
}

// ── Código Godot ─────────────────────────────────────────────────────────────

function hexToVec(hex) {
  const r = (parseInt(hex.slice(1,3),16)/255).toFixed(2);
  const g = (parseInt(hex.slice(3,5),16)/255).toFixed(2);
  const b = (parseInt(hex.slice(5,7),16)/255).toFixed(2);
  return `${r}, ${g}, ${b}, 1.0`;
}

function updateCode() {
  const ratio = offY > 0 ? (offX/offY).toFixed(2) : '0.00';
  const cRoof = document.getElementById('c-roof').value;
  const cWall = document.getElementById('c-wall').value;
  const cBase = document.getElementById('c-base').value;
  const oy    = offY.toFixed(2);

  let wallBlock = '';
  if (mode === 0) {
    wallBlock =
`\t# Base deslocada (modo atual)
\tvar pool_wall = PoolVector2Array()
\tfor v in pool:
\t    pool_wall.append(v + offset)
\tvar face = Polygon2D.new()
\tface.polygon = pool_wall
\tface.color   = Color(${hexToVec(cBase)})
\tface.z_index = -3
\tadd_child(face)`;
  } else if (mode === 1) {
    wallBlock =
`\t# Base deslocada
\tvar pool_wall = PoolVector2Array()
\tfor v in pool:
\t    pool_wall.append(v + offset)
\tvar face = Polygon2D.new()
\tface.polygon = pool_wall
\tface.color   = Color(${hexToVec(cBase)})
\tface.z_index = -3
\tadd_child(face)

\t# Quads de parede
\tvar n = pool.size()
\tfor i in range(n):
\t    var a = pool[i]
\t    var b = pool[(i+1)%n]
\t    var q = Polygon2D.new()
\t    q.polygon = PoolVector2Array([a, b, b+offset, a+offset])
\t    q.color   = Color(${hexToVec(cWall)})
\t    q.z_index = -2
\t    add_child(q)`;
  } else {
    wallBlock =
`\t# Só quads de parede (sem base deslocada)
\tvar n = pool.size()
\tfor i in range(n):
\t    var a = pool[i]
\t    var b = pool[(i+1)%n]
\t    var q = Polygon2D.new()
\t    q.polygon = PoolVector2Array([a, b, b+offset, a+offset])
\t    q.color   = Color(${hexToVec(cWall)})
\t    q.z_index = -2
\t    add_child(q)`;
  }

  document.getElementById('code-out').textContent =
`var wall_px = clamp(altura_m * 0.15, 1.0, ${oy})
var offset  = Vector2(wall_px * ${ratio}, wall_px)

${wallBlock}

\t# Telhado
\tvisual.color = Color(${hexToVec(cRoof)})
\tvisual.z_index = -1`;
}

function copiar() {
  navigator.clipboard.writeText(document.getElementById('code-out').textContent);
}

// ── Controles ─────────────────────────────────────────────────────────────────

function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b,i) => {
    if (b.closest('.mode-row') === btn.closest('.mode-row'))
      b.classList.toggle('active', b === btn);
  });
  render();
}

function setShape(s, btn) {
  shape = s;
  btn.closest('.mode-row').querySelectorAll('.mode-btn').forEach(b =>
    b.classList.toggle('active', b === btn));
  render();
}

document.getElementById('sl-ox').addEventListener('input', function() {
  offX = +this.value;
  document.getElementById('v-ox').textContent = offX.toFixed(1);
  render();
});
document.getElementById('sl-oy').addEventListener('input', function() {
  offY = +this.value;
  document.getElementById('v-oy').textContent = offY.toFixed(1);
  render();
});
['c-roof','c-wall','c-base'].forEach(id =>
  document.getElementById(id).addEventListener('input', render));
['sh-base','sh-wall','sh-roof'].forEach(id =>
  document.getElementById(id).addEventListener('change', render));

// ── Drag offset dot ───────────────────────────────────────────────────────────

canvas.addEventListener('mousedown', e => {
  const r  = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const dx = mx - (OX + offX*DS), dy = my - (OY + offY*DS);
  if (Math.sqrt(dx*dx + dy*dy) < 14) dragging = true;
});

canvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  const r  = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  offX = Math.max(0,  (mx - OX) / DS);
  offY = Math.max(0.1,(my - OY) / DS);
  offX = Math.min(offX, 12);
  offY = Math.min(offY, 15);
  document.getElementById('sl-ox').value = offX.toFixed(1);
  document.getElementById('sl-oy').value = offY.toFixed(1);
  document.getElementById('v-ox').textContent = offX.toFixed(1);
  document.getElementById('v-oy').textContent = offY.toFixed(1);
  render();
});

canvas.addEventListener('mouseup',    () => dragging = false);
canvas.addEventListener('mouseleave', () => dragging = false);

render();
</script>
</body>
</html>
